<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMass Boston Campus Navigation Chatbot</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #003366; color: white; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; background-color: white; color: #003366; padding: 20px; overflow: hidden; width: 100%; height: 100vh; }
        h1 { margin: 0 0 15px 0; font-size: clamp(1.5rem, 4vw, 2rem); }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #003366; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border-radius: 4px; }
        .message { max-width: 70%; padding: 10px; border-radius: 15px; word-wrap: break-word; white-space: pre-wrap; font-size: clamp(0.875rem, 2vw, 1rem); }
        .message a { color: #66ccff; text-decoration: underline; }
        .message a:hover { color: #99ccff; text-decoration: none; }
        .user { align-self: flex-end; background-color: #e0e0e0; color: black; border-bottom-right-radius: 0; }
        .assistant { align-self: flex-start; background-color: #003366; color: white; border-bottom-left-radius: 0; }
        .citations { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.25); }
        .citations-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; opacity: 0.9; }
        .citation-list { margin: 0; padding-left: 18px; }
        .citation-list li { margin-bottom: 8px; }
        .citation-source { display: block; font-size: 0.82rem; opacity: 0.85; margin-top: 2px; word-break: break-word; }
        .loading { align-self: flex-start; background-color: #003366; color: white; padding: 10px 15px; border-radius: 15px; border-bottom-left-radius: 0; display: inline-flex; align-items: center; gap: 6px; }
        .dot { height: 6px; width: 6px; background-color: white; border-radius: 50%; display: inline-block; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        #chat-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 10px; font-size: clamp(0.875rem, 2vw, 1rem); border: 1px solid #003366; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #003366; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: clamp(0.875rem, 2vw, 1rem); white-space: nowrap; }
        button:hover { background-color: #002244; }
        .options { margin: 10px 0; color: #003366; font-size: clamp(0.75rem, 1.5vw, 0.95rem); flex-basis: 100%; }
        .route-image { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #d0d8e0; }
        .suggested-questions { margin: 15px 0; color: #003366; }
        .suggested-questions label { display: block; font-weight: bold; margin-bottom: 8px; }
        .suggested-btn { display: inline-block; background-color: #e0e0e0; color: #003366; padding: 8px 12px; margin: 4px 4px 4px 0; border-radius: 6px; cursor: pointer; font-size: clamp(0.75rem, 1.5vw, 0.9rem); border: 1px solid #003366; transition: background-color 0.2s; }
        .suggested-btn:hover { background-color: #003366; color: white; }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .message { max-width: 85%; }
            input[type="text"] { min-width: 150px; }
        }

        @media (max-width: 480px) {
            .container { padding: 10px; }
            h1 { margin-bottom: 10px; }
            #chat { margin-bottom: 10px; padding: 8px; }
            .message { max-width: 90%; padding: 8px; font-size: 0.875rem; }
            input[type="text"] { min-width: 120px; padding: 8px; }
            button { padding: 8px 15px; }
            .options { margin: 8px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UMass Boston Campus Navigation Chatbot</h1>
        <div id="chat"></div>
        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Ask a question..." required>
            <button type="submit">Send</button>
            <div class="options">
                <label>
                    <input type="checkbox" id="show-route-map"> Show route map for navigation answers
                </label>
            </div>
        </form>
    </div>
    <script>
        const onboardingMessage = "{{ onboard_message }}";
        const suggestedQuestions = JSON.parse('{{ (suggested_questions or []) | tojson | safe }}');
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const showRouteMap = document.getElementById('show-route-map');
        
        // Display onboarding message in chat
        const onboardDiv = document.createElement('div');
        onboardDiv.className = 'message assistant';
        onboardDiv.textContent = onboardingMessage;
        chat.appendChild(onboardDiv);
        
        // Display suggested questions in chat window
        if (suggestedQuestions.length > 0) {
            const suggestDiv = document.createElement('div');
            suggestDiv.style.marginTop = '10px';
            suggestDiv.style.marginBottom = '10px';
            const label = document.createElement('p');
            label.style.fontWeight = 'bold';
            label.style.marginBottom = '8px';
            label.style.color = '#003366';
            label.textContent = 'Suggested questions:';
            suggestDiv.appendChild(label);
            
            suggestedQuestions.forEach(question => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'suggested-btn';
                btn.textContent = question;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    sendMessage(question);
                });
                suggestDiv.appendChild(btn);
            });
            
            chat.appendChild(suggestDiv);
        }
        
        chat.scrollTop = chat.scrollHeight;
        
        function formatLinks(text) {
            if (!text) return '';
            // Convert markdown-style links [label](url) into anchors
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m, label, url) => {
                return `<a href="${url}" target="_blank" style="color: #66ccff;">${label}</a>`;
            });

            // Replace bare URLs only outside of existing HTML tags to avoid corrupting anchors
            const urlRegex = /(https?:\/\/[^\s<>\"']*[^\s<>\"'.,!?;:])/g;
            const parts = text.split(/(<[^>]+>)/g);
            for (let i = 0; i < parts.length; i++) {
                if (!parts[i].startsWith('<')) {
                    parts[i] = parts[i].replace(urlRegex, (url) => `<a href="${url}" target="_blank" style="color: #66ccff;">${url}</a>`);
                }
            }
            return parts.join('');
        }

        function appendAssistantMessage(responseText, routeMapUrl, imageBase64, citations) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message assistant';
            messageElement.innerHTML = formatLinks(responseText || '');

            if (routeMapUrl) {
                const mapImage = document.createElement('img');
                mapImage.className = 'route-image';
                mapImage.src = routeMapUrl;
                mapImage.alt = 'Route map';
                messageElement.appendChild(document.createElement('br'));
                messageElement.appendChild(mapImage);
            }

            if (imageBase64) {
                const mapImage = document.createElement('img');
                mapImage.className = 'route-image';
                mapImage.src = `data:image/png;base64,${imageBase64}`;
                mapImage.alt = 'Route map';
                messageElement.appendChild(document.createElement('br'));
                messageElement.appendChild(mapImage);
            }

            if (Array.isArray(citations) && citations.length > 0) {
                const citationsWrapper = document.createElement('div');
                citationsWrapper.className = 'citations';

                const title = document.createElement('div');
                title.className = 'citations-title';
                title.textContent = 'Citations';
                citationsWrapper.appendChild(title);

                const citationList = document.createElement('ol');
                citationList.className = 'citation-list';

                citations.slice(0, 5).forEach((citation) => {
                    const item = document.createElement('li');

                    const citationTitle = document.createElement('div');
                    citationTitle.className = 'citation-source';
                    citationTitle.textContent = citation.document_name || 'Unknown source';
                    item.appendChild(citationTitle);

                    const citationSource = document.createElement('div');
                    citationSource.className = 'citation-source';

                    if (citation.source && /^https?:\/\//i.test(citation.source)) {
                        const link = document.createElement('a');
                        link.href = citation.source;
                        link.target = '_blank';
                        link.rel = 'noreferrer noopener';
                        link.textContent = citation.source;
                        citationSource.appendChild(link);
                    } else {
                        citationSource.textContent = citation.source || 'Unknown source';
                    }

                    item.appendChild(citationSource);

                    citationList.appendChild(item);
                });

                citationsWrapper.appendChild(citationList);
                messageElement.appendChild(citationsWrapper);
            }

            chat.appendChild(messageElement);
            chat.scrollTop = chat.scrollHeight;
        }

        function appendLoadingMessage() {
            const loadingElement = document.createElement('div');
            loadingElement.id = "loading-" + Date.now();
            loadingElement.className = 'loading';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                loadingElement.appendChild(dot);
            }

            chat.appendChild(loadingElement);
            chat.scrollTop = chat.scrollHeight;
            return loadingElement;
        }

        async function sendMessage(message) {
            message = (message || '').trim();
            if (!message) return;

            input.value = '';
            const userMessage = document.createElement('div');
            userMessage.className = 'message user';
            userMessage.textContent = message;
            chat.appendChild(userMessage);
            const loadingElement = appendLoadingMessage();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: message,
                        show_route_map: showRouteMap.checked
                    })
                });
                const data = await response.json();
                if (loadingElement) {
                    loadingElement.remove();
                }
                if (!response.ok) {
                    console.error('Server error:', data);
                    const errorMessage = document.createElement('div');
                    errorMessage.className = 'message assistant';
                    errorMessage.textContent = `Server error: ${data.response || 'Unknown error'}`;
                    chat.appendChild(errorMessage);
                    chat.scrollTop = chat.scrollHeight;
                    return;
                }
                appendAssistantMessage(data.response, data.route_map_url, data.image_base64, data.citations);
            } catch (error) {
                if (loadingElement) {
                    loadingElement.remove();
                }
                console.error('Error processing request:', error);
                const errorMessage = document.createElement('div');
                errorMessage.className = 'message assistant';
                errorMessage.textContent = `Error processing your request: ${error.message}`;
                chat.appendChild(errorMessage);
                chat.scrollTop = chat.scrollHeight;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await sendMessage(input.value);
        });
    </script>
</body>
</html>
