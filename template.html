<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMass Boston Campus Navigation Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #003366; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background-color: white; color: #003366; padding: 20px; border-radius: 8px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #003366; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px; border-radius: 15px; word-wrap: break-word; white-space: pre-wrap; }
        .message a { color: #66ccff; text-decoration: underline; }
        .message a:hover { color: #99ccff; text-decoration: none; }
        .user { align-self: flex-end; background-color: #e0e0e0; color: black; border-bottom-right-radius: 0; }
        .assistant { align-self: flex-start; background-color: #003366; color: white; border-bottom-left-radius: 0; }
        .loading { align-self: flex-start; background-color: #003366; color: white; padding: 10px 15px; border-radius: 15px; border-bottom-left-radius: 0; display: inline-flex; align-items: center; gap: 6px; }
        .dot { height: 6px; width: 6px; background-color: white; border-radius: 50%; display: inline-block; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        input[type="text"] { width: 80%; padding: 10px; }
        button { padding: 10px; background-color: #003366; color: white; border: none; cursor: pointer; }
        .options { margin: 10px 0; color: #003366; font-size: 0.95rem; }
        .route-image { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #d0d8e0; }
        .suggested-questions { margin: 15px 0; color: #003366; }
        .suggested-questions label { display: block; font-weight: bold; margin-bottom: 8px; }
        .suggested-btn { display: inline-block; background-color: #e0e0e0; color: #003366; padding: 8px 12px; margin: 4px 4px 4px 0; border-radius: 6px; cursor: pointer; font-size: 0.9rem; border: 1px solid #003366; transition: background-color 0.2s; }
        .suggested-btn:hover { background-color: #003366; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UMass Boston Campus Navigation Chatbot</h1>
        <p style="margin-top:-4px; margin-bottom:12px;">
            <a href="/evaluation" style="color:#003366; font-weight:600;">Open Evaluation Dashboard</a>
        </p>
        <div id="chat"></div>
        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Ask a question..." required>
            <button type="submit">Send</button>
            <div class="options">
                <label>
                    <input type="checkbox" id="show-route-map"> Show route map for navigation answers
                </label>
            </div>
        </form>
    </div>
    <script>
        const onboardingMessage = "{{ onboard_message }}";
        const suggestedQuestions = {{ suggested_questions|tojson if suggested_questions else '[]' }};
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const showRouteMap = document.getElementById('show-route-map');
        
        // Display onboarding message in chat
        const onboardDiv = document.createElement('div');
        onboardDiv.className = 'message assistant';
        onboardDiv.textContent = onboardingMessage;
        chat.appendChild(onboardDiv);
        
        // Display suggested questions in chat window
        if (suggestedQuestions.length > 0) {
            const suggestDiv = document.createElement('div');
            suggestDiv.style.marginTop = '10px';
            suggestDiv.style.marginBottom = '10px';
            const label = document.createElement('p');
            label.style.fontWeight = 'bold';
            label.style.marginBottom = '8px';
            label.style.color = '#003366';
            label.textContent = 'Suggested questions:';
            suggestDiv.appendChild(label);
            
            suggestedQuestions.forEach(question => {
                const btn = document.createElement('button');
                btn.className = 'suggested-btn';
                btn.textContent = question;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    input.value = question;
                    form.dispatchEvent(new Event('submit'));
                });
                suggestDiv.appendChild(btn);
            });
            
            chat.appendChild(suggestDiv);
        }
        
        chat.scrollTop = chat.scrollHeight;
        
        function formatLinks(text) {
            if (!text) return '';
            // Convert markdown-style links [label](url) into anchors
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m, label, url) => {
                return `<a href="${url}" target="_blank" style="color: #66ccff;">${label}</a>`;
            });

            // Replace bare URLs only outside of existing HTML tags to avoid corrupting anchors
            const urlRegex = /(https?:\/\/[^\s<>\"']*[^\s<>\"'.,!?;:])/g;
            const parts = text.split(/(<[^>]+>)/g);
            for (let i = 0; i < parts.length; i++) {
                if (!parts[i].startsWith('<')) {
                    parts[i] = parts[i].replace(urlRegex, (url) => `<a href="${url}" target="_blank" style="color: #66ccff;">${url}</a>`);
                }
            }
            return parts.join('');
        }

        function appendAssistantMessage(responseText, routeMapUrl, imageBase64) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message assistant';
            messageElement.innerHTML = formatLinks(responseText || '');

            if (routeMapUrl) {
                const mapImage = document.createElement('img');
                mapImage.className = 'route-image';
                mapImage.src = routeMapUrl;
                mapImage.alt = 'Route map';
                messageElement.appendChild(document.createElement('br'));
                messageElement.appendChild(mapImage);
            }

            if (imageBase64) {
                const mapImage = document.createElement('img');
                mapImage.className = 'route-image';
                mapImage.src = `data:image/png;base64,${imageBase64}`;
                mapImage.alt = 'Route map';
                messageElement.appendChild(document.createElement('br'));
                messageElement.appendChild(mapImage);
            }

            chat.appendChild(messageElement);
            chat.scrollTop = chat.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value;
            input.value = '';
            const userMessage = document.createElement('div');
            userMessage.className = 'message user';
            userMessage.textContent = message;
            chat.appendChild(userMessage);
            const loadingMessage = "loading-" + Date.now();
            chat.innerHTML += `<div id="${loadingMessage}" class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: message,
                        show_route_map: showRouteMap.checked
                    })
                });
                const data = await response.json();
                const loadingElement = document.getElementById(loadingMessage);
                if (loadingElement) {
                    loadingElement.remove();
                }
                if (!response.ok) {
                    console.error('Server error:', data);
                    const errorMessage = document.createElement('div');
                    errorMessage.className = 'message assistant';
                    errorMessage.textContent = `Server error: ${data.response || 'Unknown error'}`;
                    chat.appendChild(errorMessage);
                    chat.scrollTop = chat.scrollHeight;
                    return;
                }
                appendAssistantMessage(data.response, data.route_map_url, data.image_base64);
            } catch (error) {
                const loadingElement = document.getElementById(loadingMessage);
                if (loadingElement) {
                    loadingElement.remove();
                }
                console.error('Error processing request:', error);
                const errorMessage = document.createElement('div');
                errorMessage.className = 'message assistant';
                errorMessage.textContent = `Error processing your request: ${error.message}`;
                chat.appendChild(errorMessage);
                chat.scrollTop = chat.scrollHeight;
            }
        });
    </script>
</body>
</html>
